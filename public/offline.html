<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem conexão — MSX CRM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      font-size: 4rem;
      opacity: 0.6;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f8fafc;
    }
    p {
      color: #94a3b8;
      font-size: 1rem;
      max-width: 400px;
      line-height: 1.6;
    }
    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Sem conexão com a internet</h1>
  <p>Verifique sua conexão e tente novamente. Algumas funcionalidades ficam disponíveis offline.</p>
  <button onclick="window.location.reload()">Tentar novamente</button>
</body>
</html>
