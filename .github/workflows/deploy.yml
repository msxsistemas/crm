name: Deploy — MSX CRM

on:
  push:
    branches: [master]

jobs:
  test:
    name: Testes Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package.json
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Run tests
        working-directory: backend
        run: npm test

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.msxzap.pro
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Deploy frontend para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 185.139.1.201
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: dist/
          target: /var/www/msxcrm/frontend
          strip_components: 1
          rm: true

      - name: Deploy backend para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 185.139.1.201
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: backend/src/,backend/package.json
          target: /var/www/msxcrm/backend
          strip_components: 1

      - name: Reiniciar serviços
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 185.139.1.201
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/msxcrm/backend
            npm install --production
            nginx -t && systemctl reload nginx
            pm2 restart msxcrm-backend
            sleep 3
            curl -sf http://localhost:3000/health && echo "✅ Backend OK" || echo "⚠️ Backend health check falhou"
            echo "✅ Deploy concluído — https://msxzap.pro"
